<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="256" cy="200" rx="220" ry="160" fill="url(#glow1)"/>
  <ellipse cx="256" cy="340" rx="180" ry="140" fill="url(#glow2)"/>

  <!-- Lightning bolt shape (geometric) -->
  <polygon points="290,80 190,270 250,270 220,432 350,230 280,230 320,80"
           fill="url(#g1)" opacity="0.95"/>

  <!-- Inner highlight -->
  <polygon points="284,104 200,264 248,264 222,400 334,244 274,244 308,104"
           fill="url(#g2)" opacity="0.55"/>

  <!-- ARCADE text -->
  <text x="256" y="490" text-anchor="middle"
        font-size="52" font-weight="900" letter-spacing="10"
        fill="url(#g2)" font-family="'Courier New', Courier, monospace"
        opacity="0.9">ARCADE</text>
</svg>
