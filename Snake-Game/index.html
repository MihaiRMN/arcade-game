<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake</title>
    <link rel="stylesheet" href="style.css">
    <!-- Day/Night propagation from portal -->
    <script>if(localStorage.getItem('portal_daymode')==='true')document.documentElement.setAttribute('data-daymode','true');</script>
    <style>
        html[data-daymode="true"] body { background: #e8f5e9 !important; }
        html[data-daymode="true"] #game-container { background: #e8f5e9 !important; }
    </style>
</head>
<body>

<div id="game-container">

    <!-- HEADER BAR -->
    <div id="header-bar">
        <a href="../game-portal/index.html" id="back-btn">← PORTAL</a>
        <h1>🐍 SNAKE</h1>
        <div id="player-info">Playing as <span id="player-name">Player</span></div>
    </div>

    <!-- SCORE ROW -->
    <div id="score-board">
        <div class="score-item">
            <span class="score-label">SCORE</span>
            <span id="score" class="score-val">0</span>
        </div>
        <div class="score-item" id="highscore-box">
            <span class="score-label">BEST</span>
            <span id="highscore" class="score-val">0</span>
        </div>
        <div class="score-item" id="timer-box">
            <span class="score-label">TIME</span>
            <span id="timer" class="score-val">60</span>
        </div>
        <div class="score-item" id="ta-best-box">
            <span class="score-label">TA BEST</span>
            <span id="ta-best" class="score-val">0</span>
        </div>
    </div>

    <!-- PRE-GAME PANEL (shown when not running) -->
    <div id="pre-panel">

        <div class="panel-section">
            <div class="section-label">MODE</div>
            <div id="mode-btns">
                <button class="mode-btn active-mode" data-mode="classic">🎮 CLASSIC</button>
                <button class="mode-btn" data-mode="time">⏱ TIME ATTACK</button>
                <button class="mode-btn" data-mode="maze">🧩 MAZE</button>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-label">SKIN</div>
            <div id="skin-grid"></div>
        </div>

        <div id="pre-message">Press any arrow key to start!</div>

    </div>

    <!-- ACTIVE POWER-UP BAR (shown during game) -->
    <div id="powerup-bar"></div>

    <!-- CANVAS -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- TRANSIENT MESSAGES -->
    <div id="message"></div>

</div>

<!-- REVIVE POPUP -->
<div id="revive-popup" class="hidden">
    <div id="revive-box">
        <div id="revive-emoji">💀</div>
        <div id="revive-title">REVIVE AVAILABLE!</div>
        <div id="revive-msg">You have <strong id="revive-count">1</strong> revive remaining.</div>
        <div id="revive-btns">
            <button id="revive-yes-btn">💀 REVIVE!</button>
            <button id="revive-no-btn">Give Up</button>
        </div>
    </div>
</div>
<style>
#revive-popup{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(8px);}
#revive-popup.hidden{display:none!important;}
#revive-box{background:rgba(4,14,12,0.97);border:2px solid #4ecca3;border-radius:16px;padding:36px 40px;text-align:center;max-width:340px;width:90%;box-shadow:0 0 60px rgba(78,204,163,0.3);font-family:'Courier New',monospace;animation:reviveIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes reviveIn{from{transform:scale(0.7) translateY(-20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
#revive-emoji{font-size:54px;margin-bottom:12px;animation:revivePulse 0.8s ease-in-out infinite alternate;}
@keyframes revivePulse{from{filter:drop-shadow(0 0 8px #4ecca3);}to{filter:drop-shadow(0 0 24px #4ecca3);}}
#revive-title{font-size:22px;font-weight:900;letter-spacing:3px;color:#4ecca3;margin-bottom:10px;}
#revive-msg{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:22px;}
#revive-msg strong{color:#4ecca3;}
#revive-btns{display:flex;gap:12px;}
#revive-yes-btn{flex:1;padding:13px;background:linear-gradient(135deg,#2a9b7a,#4ecca3);border:none;border-radius:8px;color:#001a14;font-family:'Courier New',monospace;font-size:13px;font-weight:900;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
#revive-yes-btn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(78,204,163,0.5);}
#revive-no-btn{flex:1;padding:13px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:8px;color:#ef4444;font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
#revive-no-btn:hover{background:rgba(239,68,68,0.2);}
/* ── Exit Portal – Snake ── */
#exit-portal-btn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.65);border:1px solid #4ecca3;border-radius:8px;color:#4ecca3;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;letter-spacing:1px;backdrop-filter:blur(4px);transition:all 0.2s;line-height:1;}
#exit-portal-btn:hover{background:rgba(0,0,0,0.88);box-shadow:0 0 16px rgba(78,204,163,0.55);transform:translateY(-1px);}
#exit-confirm{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#exit-confirm.hidden{display:none!important;}
#exit-confirm-box{background:rgba(4,14,12,0.98);border:2px solid #4ecca3;border-radius:14px;padding:28px 32px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 40px rgba(78,204,163,0.22);font-family:'Courier New',monospace;}
#exit-confirm-icon{font-size:34px;margin-bottom:10px;}
#exit-confirm-title{font-size:17px;font-weight:900;letter-spacing:3px;color:#4ecca3;margin-bottom:10px;}
#exit-confirm-msg{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:22px;}
#exit-confirm-btns{display:flex;gap:10px;}
#exit-confirm-yes{flex:1;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.45);border-radius:8px;color:#ef4444;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:1px;padding:10px 6px;cursor:pointer;transition:all 0.2s;}
#exit-confirm-yes:hover{background:rgba(239,68,68,0.28);box-shadow:0 0 10px rgba(239,68,68,0.3);}
#exit-confirm-no{flex:1;background:rgba(78,204,163,0.1);border:1px solid #4ecca3;border-radius:8px;color:#4ecca3;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:1px;padding:10px 6px;cursor:pointer;transition:all 0.2s;}
#exit-confirm-no:hover{background:rgba(78,204,163,0.22);}
</style>
<button id="exit-portal-btn">🏠 PORTAL</button>
<div id="exit-confirm" class="hidden">
  <div id="exit-confirm-box">
    <div id="exit-confirm-icon">🚪</div>
    <div id="exit-confirm-title">IESI DIN JOC?</div>
    <div id="exit-confirm-msg">Progresul curent se va salva.</div>
    <div id="exit-confirm-btns">
      <button id="exit-confirm-yes">✓ DA, IESI</button>
      <button id="exit-confirm-no">✗ CONTINUA</button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
